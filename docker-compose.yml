services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: neatfleet
      POSTGRES_USER: neatfleet
      POSTGRES_PASSWORD: neatfleet
    ports:
      - "5432:5432"
    volumes:
      - neatfleet_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neatfleet -d neatfleet"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  neatfleet_postgres:

